modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="${neo_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="slag"
type="optional"
versionRange="[0,)"
ordering="AFTER"
side="BOTH"

# EMI: our built-in recipe-viewer plugin (client-only; ASM-discovered via @EmiEntrypoint, no server code).
[[dependencies.${mod_id}]]
modId="emi"
type="optional"
versionRange="[1.1.0,)"
ordering="AFTER"
side="CLIENT"
